# HighByte IntelligenceHub — Dev / Test stack
#
# Topology:
#   hivemq  (shared MQTT broker)
#   ignition (SCADA gateway)
#   dev  (HighByte central hub)
#    └── test  (HighByte remote of dev  |  central hub)
#
# Port mapping (host:container):
#   hivemq   — MQTT: 1883
#   ignition — HTTP: 9088  |  HTTPS: 9043
#   dev      — REST API: 45245  |  MQTT: 1885  |  Data/MCP: 8885
#
# ─── Validated deployment files ───────────────────────────────────────────────
#   intelligencehub-deployment.json  ← single validated HighByte config
#   hivemq/config.xml                ← version-controlled broker config
#   ignition/gateway.gwbk            ← validated Ignition backup (see ignition/README.md)
#
# ─── Central-config wiring (one-time manual step) ────────────────────────────
#  1. docker compose up -d
#  2. Open dev UI  → http://localhost:45245
#       Network → Hubs → Create Network Group → copy the generated TOKEN
#       Paste it into appdata/test/intelligencehub-remoteconfig.json  ("token" field)
#  3. docker compose restart test
# ─────────────────────────────────────────────────────────────────────────────

services:

  hivemq:
    image: hivemq/hivemq-ce:latest
    container_name: hivemq
    restart: on-failure
    ports:
      - "1883:1883"     # MQTT
    environment:
      HIVEMQ_CONFIG_FOLDER: /mqtt-config
      HIVEMQ_PORT: 1883
    volumes:
      - ./hivemq:/mqtt-config:ro
    networks:
      - highbyte-net

  ignition:
    image: inductiveautomation/ignition:latest
    container_name: ignition
    restart: on-failure
    ports:
      - "9088:8088"     # HTTP gateway UI
      - "9043:8043"     # HTTPS gateway UI
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      GATEWAY_ADMIN_USERNAME: admin
      GATEWAY_ADMIN_PASSWORD: "changeme"
      IGNITION_EDITION: standard
      DISABLE_QUICKSTART: "true"
      GATEWAY_HTTP_PORT: 8088
      GATEWAY_HTTPS_PORT: 8043
    volumes:
      - ignition-data:/usr/local/bin/ignition/data
      - ./ignition:/restore:ro
    # ── Restore from validated gateway backup ──────────────────────────────
    # Uncomment the -r flag AFTER committing ignition/gateway.gwbk.
    # The restore only runs on a fresh (empty) data directory.
    # See ignition/README.md for the full backup/restore workflow.
    command: >
      -n ignition
      -a localhost
      -h 8088
      -s 8043
    networks:
      - highbyte-net
    depends_on:
      - hivemq

  dev:
    image: "sha256:d2bf21f8ef9c4290df27145119160a7627872e170915f1187ddc8c8562381af9"
    container_name: highbyte-dev
    restart: on-failure
    ports:
      - "45245:45245"   # REST API / WebSocket (central hub endpoint)
      - "1885:1885"     # Internal MQTT broker
      - "8885:8885"     # REST data server / MCP / I3X
    volumes:
      - ./appdata/dev:/usr/local/highbyte/appData
    environment:
      HIGHBYTE_DEPLOYMENT_FILE: /usr/local/highbyte/appData/deployment-settings.json
    networks:
      - highbyte-net
    depends_on:
      - hivemq

networks:
  highbyte-net:
    driver: bridge

volumes:
  ignition-data:
